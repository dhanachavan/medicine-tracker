# GitHub Copilot agent setup workflow
# This workflow prepares the environment for the following custom Copilot agents:
#   - step1-contribution-branch-preparer
#   - step2-contribution-pr-validator
#   - step3-contribution-access-cleaner
# IMPORTANT: This file must exist on the default branch for Copilot to use it.
# The job name 'copilot-setup-steps' is mandatory and must not be changed.
name: "Copilot Setup Steps"
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    environment:
      name: copilot
    permissions:
      contents: write         # Allow creating branches (refs) and pushing to the repository
      issues: write           # Allow posting issue comments
      pull-requests: write    # Allow posting PR comments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: true    # Retain GitHub token for branch push operations
          fetch-depth: 0               # Full history for branch operations and codebase searches
      - name: Set up Git identity for commits (Copilot agent)
        run: |
          git config --global user.name "GitHub Copilot"
          git config --global user.email "copilot-agent@users.noreply.github.com"
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Additional setup steps (if needed) can be added below.
