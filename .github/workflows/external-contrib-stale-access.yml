name: External Contribution - Stale Access Reaper

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  reap-stale-access:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Find and clean up stale ext/ branches + access
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Branches older than STALE_DAYS without an open PR are considered stale
            const STALE_DAYS = 14;
            const cutoff = Date.now() - (STALE_DAYS * 24 * 60 * 60 * 1000);

            // List all ext/ branches
            const refs = await github.paginate(
              github.rest.git.listMatchingRefs,
              { owner, repo, ref: 'heads/ext/' }
            );

            const extBranches = refs
              .map(r => r.ref)
              .filter(r => r.startsWith('refs/heads/ext/'))
              .map(r => r.replace('refs/heads/', ''));

            if (extBranches.length === 0) {
              console.log('No ext/ branches found. Nothing to do.');
              return;
            }

            console.log(`Found ${extBranches.length} ext/ branch(es). Checking for staleness...`);

            for (const branch of extBranches) {
              // Parse timestamp from branch name: ext/issue-N/user/timestamp
              const parts = branch.split('/');
              const stamp = Number.parseInt(parts[parts.length - 1], 10);

              if (!Number.isFinite(stamp) || stamp > cutoff) {
                console.log(`SKIP (not stale): ${branch}`);
                continue;
              }

              // Check if there's an open PR from this branch
              const prs = await github.rest.pulls.list({
                owner, repo,
                head: `${owner}:${branch}`,
                state: 'open'
              });

              if (prs.data.length > 0) {
                console.log(`SKIP (has open PR): ${branch}`);
                continue;
              }

              // Branch is stale — clean up
              console.log(`STALE: ${branch} (created ${new Date(stamp).toISOString()})`);

              // Parse user and issue from branch name
              const userMatch = branch.match(/^ext\/issue-\d+\/([^/]+)\//);
              const issueMatch = branch.match(/issue-(\d+)/);
              const username = userMatch ? userMatch[1] : null;
              const issue_number = issueMatch ? parseInt(issueMatch[1], 10) : null;

              // Best-effort: remove collaborator access
              if (username) {
                try {
                  await github.request('DELETE /repos/{owner}/{repo}/collaborators/{username}', {
                    owner, repo, username
                  });
                  console.log(`  Revoked access for @${username}`);
                } catch (e) {
                  console.log(`  Access revocation skipped (may already be removed)`);
                }
              }

              // Best-effort: delete branch
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
                console.log(`  Deleted branch ${branch}`);
              } catch (e) {
                console.log(`  Branch deletion skipped (may already be deleted)`);
              }

              // Notify on the linked issue
              if (issue_number) {
                const staleDays = Math.floor((Date.now() - stamp) / (24 * 60 * 60 * 1000));
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `🧹 **Stale access reaper**: Branch \`${branch}\` was ${staleDays} days old with no open PR.\n\n- Temporary access for ${username ? `@${username}` : '(unknown user)'} has been revoked.\n- Branch has been deleted.\n\nIf work is still in progress, a maintainer can re-run \`/grant @${username || 'username'}\` to create a new branch.`
                });
              }
            }

            console.log('Stale access reaper finished.');
