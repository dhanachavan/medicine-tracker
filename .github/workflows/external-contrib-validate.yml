name: External Contribution - Validate

on:
  # Runs when an external contributor pushes to the external branch
  push:
    branches: ["ext/**"]

  # Runs when a PR is opened/updated from an external branch
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["main"]

permissions:
  contents: read
  issues: write

concurrency:
  # Use a stable key for both event types to prevent overlapping runs
  group: external-contrib-validate-${{ github.repository }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # For PR events: run ONLY if PR head branch starts with ext/
    # For push events: already filtered by branches: ext/**
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'ext/'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure scripts are executable
        shell: bash
        run: |
          chmod +x .github/scripts/detect_and_run_tests.sh || true
          chmod +x .github/scripts/external_contrib_checks.sh || true

      - name: Auto-detect and run tests (best-effort)
        id: tests
        shell: bash
        continue-on-error: true
        run: |
          bash .github/scripts/detect_and_run_tests.sh 2>&1 | tee test_output.txt
          # Capture actual test exit code for the summary
          TEST_RC=${PIPESTATUS[0]}
          echo "test_rc=${TEST_RC}" >> "$GITHUB_OUTPUT"
          # Extract pass/fail/skip counts from output
          PASS=$(grep -c 'Result:.*=> PASS' test_output.txt || echo 0)
          FAIL=$(grep -c 'Result:.*=> FAIL' test_output.txt || echo 0)
          SKIP=$(grep -c 'Result:.*=> SKIP' test_output.txt || echo 0)
          echo "pass=${PASS}" >> "$GITHUB_OUTPUT"
          echo "fail=${FAIL}" >> "$GITHUB_OUTPUT"
          echo "skip=${SKIP}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run lightweight checks (guidance report)
        shell: bash
        run: |
          bash .github/scripts/external_contrib_checks.sh > report.md

      - name: Post summary (PR comment only on PR events) + cross-post to Issue
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const report = fs.existsSync('report.md') ? fs.readFileSync('report.md', 'utf8') : '(report missing)';
            const tests = fs.existsSync('test_output.txt') ? fs.readFileSync('test_output.txt', 'utf8') : '';

            // Determine branch name across events
            const branch =
              context.payload.pull_request?.head?.ref ||
              context.ref.replace('refs/heads/', '');

            // Issue number inferred from branch format ext/issue-123/...
            const issueMatch = branch.match(/issue-(\d+)/);
            const issue_number = issueMatch ? parseInt(issueMatch[1], 10) : null;

            // Test result counts from the tests step
            const pass = parseInt('${{ steps.tests.outputs.pass }}' || '0', 10);
            const fail = parseInt('${{ steps.tests.outputs.fail }}' || '0', 10);
            const skip = parseInt('${{ steps.tests.outputs.skip }}' || '0', 10);
            const total = pass + fail + skip;

            // Build concise test summary
            let testSummary = '';
            if (total === 0) {
              testSummary = '🔇 No tests detected.';
            } else if (fail > 0) {
              testSummary = `❌ Tests: **${fail} failed**, ${pass} passed, ${skip} skipped`;
            } else {
              testSummary = `✅ Tests: **${pass} passed**, ${skip} skipped`;
            }

            // Truncate raw test output for details block
            const MAX = 60000;
            const testsTruncated = tests.length > MAX ? (tests.slice(0, MAX) + "\n... (truncated)") : tests;

            const bodyParts = [report, '', testSummary];

            // Only include raw output if there were actual test runs
            if (total > 0) {
              bodyParts.push(
                '',
                '<details><summary>Test output</summary>',
                '',
                '```text',
                testsTruncated,
                '```',
                '',
                '</details>'
              );
            }

            const body = bodyParts.join('\n');

            const isPREvent = context.eventName === 'pull_request';
            const prNumber = context.payload.pull_request?.number || null;

            // ✅ Avoid PR comment spam: only comment on the PR for PR events
            try {
              if (isPREvent && prNumber) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: prNumber,
                  body
                });
              }
            } catch (e) {
              core.warning(`Could not comment on PR: ${e.message}`);
            }

            // ✅ Cross-post to issue only when a PR is opened/updated against main
            try {
              if (isPREvent && issue_number) {
                const crossPost = [
                  `🔎 Validation results for \`${branch}\`${prNumber ? ` (PR #${prNumber})` : ""}`,
                  ``,
                  body
                ].join('\n');

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number,
                  body: crossPost
                });
              }
            } catch (e) {
              core.warning(`Could not cross-post to issue: ${e.message}`);
            }
